<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Media Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Media Tracker</h1>
        <p>What next!</p>
    </header>

    <form id="search-form" class="card">
        <h3>Find Media</h3>
        <input type="search" placeholder="Search your backlog..." required>
        <button type="submit">Search</button>
    </form>
    <form id="add-form" class="card">
        <h3>Add to Backlog</h3>

        <input type="text" id="media-title" placeholder="Enter title (e.g., Elden Ring)..." required>

        <input type="text" id="media-type" placeholder="Enter type (e.g., Game, Movie, Book)..." required>

        <button type="submit">Add New Media</button>
    </form>
    <main class="container">
        <h2>My Backlog</h2>
        <div id="media-list"></div>
    </main>


</body>
</html>
